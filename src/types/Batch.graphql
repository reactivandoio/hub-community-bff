type Batch {
  id: String
  batch_number: Int
  value: Float
  max_quantity: Int
  valid_from: String
  valid_until: String
  enabled: Boolean
  half_price_eligible: Boolean
}

input BatchInput {
  batch_number: Int!
  value: Float!
  max_quantity: Int
  valid_from: String!
  valid_until: String!
  enabled: Boolean
  half_price_eligible: Boolean
  product: String!
}

extend type Mutation {
  createBatch(data: BatchInput!): Batch
  updateBatch(id: String!, data: BatchInput!): Batch
  deleteBatch(id: String!): Batch
}

type Coupon {
  id: String
  code: String
  discount_percentage: Int
  max_uses: Int
  event: Event
  enabled: Boolean
  expires_at: String
}

input CouponInput {
  code: String!
  discount_percentage: Int!
  max_uses: Int
  event: String!
  enabled: Boolean
  expires_at: String
}

extend type Query {
  validateCoupon(eventSlug: String!, code: String!): ValidateCouponResponse
}

type ValidateCouponResponse {
  valid: Boolean!
  discount_percentage: Int
  message: String
}

extend type Mutation {
  createCoupon(data: CouponInput!): Coupon
  updateCoupon(id: String!, data: CouponInput!): Coupon
  deleteCoupon(id: String!): Coupon
}

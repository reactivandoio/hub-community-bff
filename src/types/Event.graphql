scalar JSON

type Event {
  id: String
  title: String
  description: JSON
  start_date: String
  end_date: String
  images: [String]
  talks: [Talk]
  communities: [Community]
  location: Location
  tags: [Tag]
  comments: [Comment]
  createdAt: String
  updatedAt: String
  documentId: String
  subscription_link: String
  slug: String
  uuid: String
  max_slots: Int
  products: [Product]
  is_online: Boolean
  call_link: String
}

type Query {
  events(
    filters: EventFilter
    sort: [EventSort]
    pagination: PaginationInput
    search: String
  ): PaginatedEvents

  event(id: String!): Event

  eventBySlugOrId(slugOrId: String!): Event

  isUserSignedUp(eventId: String!, email: String!): IsSignedUpResponse

  # Legacy query for backward compatibility
  findEvents: [Event]
}

input EventInput {
  title: String!
  description: JSON
  start_date: String!
  end_date: String!
  max_slots: Int
  slug: String
  uuid: String
  pixai_token_integration: String
  pixai_token_integration_id: String
  is_online: Boolean
  call_link: String
  location: String
  communities: [String]
  talks: [String]
}

input BatchSaleInput {
  id: String
  batch_number: Int
  value: Float
  max_quantity: Int
  valid_from: String
  valid_until: String
  enabled: Boolean
  half_price_eligible: Boolean
}

input ProductSaleInput {
  id: String
  name: String
  enabled: Boolean
  batches: [BatchSaleInput]
}

input EventSaleInput {
  max_slots: Int
  products: [ProductSaleInput]
}

type Mutation {
  submitEventComment(eventId: String!): Comment
  createEvent(data: EventInput!): Event
  updateEvent(id: String!, data: EventInput!): Event
  updateEventSale(id: String!, data: EventSaleInput!): Event
  deleteEvent(id: String!): Event
  signupToEvent(
    eventId: String!
    name: String!
    email: String!
    batch_id: String!
    coupon_code: String
    is_student: Boolean
    phone_number: String
    t_shirt_size: String
  ): SignupResponse
}

type SignupResponse {
  success: Boolean
  message: String
  payment: JSON
  is_free: Boolean
}

type Subscription {
  commentEventAdded: Comment
}

type IsSignedUpResponse {
  is_signed_up: Boolean!
  call_link: String
}

# Event filters
input EventFilter {
  id: StringFilter
  documentId: StringFilter
  title: StringFilter
  slug: StringFilter
  start_date: DateFilter
  end_date: DateFilter
  createdAt: DateFilter
  updatedAt: DateFilter
  community: CommunityFilter
  location: LocationFilter
  tags: TagFilter
  and: [EventFilter]
  or: [EventFilter]
}

# Event sort
input EventSort {
  id: SortOrder
  title: SortOrder
  start_date: SortOrder
  end_date: SortOrder
  createdAt: SortOrder
  updatedAt: SortOrder
}

# Paginated Event response
type PaginatedEvents {
  data: [Event]
  meta: PaginationInfo
}

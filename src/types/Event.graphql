scalar JSON

type Event {
  id: String
  title: String
  description: JSON
  start_date: String
  end_date: String
  images: [String]
  talks: [Talk]
  communities: [Community]
  location: Location
  tags: [Tag]
  comments: [Comment]
  createdAt: String
  updatedAt: String
  documentId: String
  subscription_link: String
  slug: String
  products: [Product]
}

type Query {
  events(
    filters: EventFilter
    sort: [EventSort]
    pagination: PaginationInput
    search: String
  ): PaginatedEvents

  event(id: String!): Event

  eventBySlugOrId(slugOrId: String!): Event

  # Legacy query for backward compatibility
  findEvents: [Event]
}

input EventInput {
  title: String!
  description: JSON
  start_date: String!
  end_date: String!
  max_slots: Int
  slug: String
}

type Mutation {
  submitEventComment(eventId: String!): Comment
  createEvent(data: EventInput!): Event
  updateEvent(id: String!, data: EventInput!): Event
  deleteEvent(id: String!): Event
  signupToEvent(
    eventId: String!
    name: String!
    email: String!
    batch_id: String!
    coupon_code: String
    is_student: Boolean
  ): SignupResponse
}

type SignupResponse {
  success: Boolean
  message: String
  payment: JSON
}

type Subscription {
  commentEventAdded: Comment
}

# Event filters
input EventFilter {
  id: StringFilter
  documentId: StringFilter
  title: StringFilter
  slug: StringFilter
  start_date: DateFilter
  end_date: DateFilter
  createdAt: DateFilter
  updatedAt: DateFilter
  community: CommunityFilter
  location: LocationFilter
  tags: TagFilter
  and: [EventFilter]
  or: [EventFilter]
}

# Event sort
input EventSort {
  id: SortOrder
  title: SortOrder
  start_date: SortOrder
  end_date: SortOrder
  createdAt: SortOrder
  updatedAt: SortOrder
}

# Paginated Event response
type PaginatedEvents {
  data: [Event]
  meta: PaginationInfo
}

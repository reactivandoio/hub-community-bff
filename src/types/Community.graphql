scalar JSON

type Community {
  id: String
  slug: String
  title: String
  short_description: String
  full_description: JSON
  images: [String]
  createdAt: String
  updatedAt: String

  events: [Event]
  tags: [Tag]
  location: Location
  founded_in: String
  links: [Link]
  members_quantity: Int
  organizers: [User]
}

# Community filters
input CommunityFilter {
  id: StringFilter
  documentId: StringFilter
  slug: StringFilter
  title: StringFilter
  short_description: StringFilter
  founded_in: StringFilter
  members_quantity: IntFilter
  createdAt: DateFilter
  updatedAt: DateFilter
  tags: TagFilter
  location: LocationFilter
  organizers: UserFilter
  and: [CommunityFilter]
  or: [CommunityFilter]
}

# Community sort
input CommunitySort {
  id: SortOrder
  title: SortOrder
  short_description: SortOrder
  founded_in: SortOrder
  members_quantity: SortOrder
  createdAt: SortOrder
  updatedAt: SortOrder
}

# Paginated Community response
type PaginatedCommunities {
  data: [Community]
  meta: PaginationInfo
}

# Community queries
extend type Query {
  communities(
    filters: CommunityFilter
    sort: [CommunitySort]
    pagination: PaginationInput
    search: String
  ): PaginatedCommunities

  community(id: String!): Community
  communityBySlugOrId(slugOrId: String!): Community
}

input CommunityInput {
  title: String
  slug: String
  short_description: String
  full_description: JSON
  founded_in: String
  members_quantity: Int
  location: String
  tags: [String]
  organizers: [String]
}

extend type Mutation {
  createCommunity(data: CommunityInput!): Community
  updateCommunity(id: String!, data: CommunityInput!): Community
  deleteCommunity(id: String!): Community
}
